flutter_launcher_icons:
  image_path: "assets/app-icon.png"

  android: true
  min_sdk_android: 21

  # Legacy icon (for older Android)
  image_path_android: "assets/app-icon.png"

  # ✅ Adaptive icon (for modern Android)
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app-icon.png"
  adaptive_icon_foreground_inset: 16

  ios: true
  image_path_ios: "assets/app-icon.png"
  remove_alpha_ios: true